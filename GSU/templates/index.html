<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sidebar-width: 260px; --bg-color: #121212; --card-bg: #1e1e1e; --accent-color: #0dcaf0; --text-muted: #8b949e; --border-color: #30363d; }
        body { background-color: var(--bg-color); height: 100vh; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #fff; }
        
        /* Sidebar Collapsible Styles */
        .sidebar { background-color: #161b22; border-right: 1px solid var(--border-color); height: 100vh; padding: 20px; overflow-y: auto; position: fixed; width: var(--sidebar-width); z-index: 100; transition: transform 0.3s ease; }
        .sidebar.collapsed { transform: translateX(-100%); }
        .main-content { margin-left: var(--sidebar-width); height: 100vh; overflow-y: auto; padding: 30px; transition: margin-left 0.3s ease; }
        .main-content.expanded { margin-left: 0; }
        .sidebar-toggle { cursor: pointer; color: var(--text-muted); transition: color 0.2s; margin-right: 15px; display: flex; align-items: center; }
        .sidebar-toggle:hover { color: #fff; }

        .nav-pills .nav-link { color: var(--text-muted); font-weight: 500; border-radius: 6px; margin-bottom: 5px; transition: all 0.2s; cursor: pointer; }
        .nav-pills .nav-link:hover { background-color: #21262d; color: #fff; }
        .nav-pills .nav-link.active { background-color: #238636; color: #fff; }
        .nav-pills .nav-link i { width: 25px; text-align: center; }
        
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .card-header { background-color: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border-color); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; color: var(--text-muted); }
        .metric-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .metric-val { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 1.25rem; color: var(--accent-color); text-shadow: 0 0 10px rgba(13, 202, 240, 0.2); }
        .log-box { font-family: 'Consolas', monospace; font-size: 0.75rem; height: 300px; overflow-y: auto; background: #0d1117; color: #7ee787; padding: 10px; border: 1px solid var(--border-color); border-radius: 0 0 6px 6px; }
        .chart-container { position: relative; height: 280px; width: 100%; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="text-center mb-4 border-bottom border-secondary pb-3">
        <h5 id="app-title" class="mb-0 text-white">Dashboard</h5>
        <div class="small text-muted" style="font-size: 0.7rem;">MISSION CONTROL</div>
    </div>
    
    <label class="metric-label mb-2 mt-2">DASHBOARD</label>
    <ul class="nav nav-pills flex-column mb-4">
        <li class="nav-item"><a class="nav-link active" onclick="showPage('control')"><i class="fas fa-satellite-dish"></i> Control Panel</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showPage('graphs')"><i class="fas fa-chart-line"></i> Telemetry</a></li>
        <li class="nav-item"><a class="nav-link" href="/norb_listener"><i class="fas fa-terminal"></i> nORB Listener</a></li>
    </ul>
    
    <div class="card p-3 bg-dark border-secondary">
        <label class="metric-label mb-2"><i class="fas fa-plug"></i> CONNECTION</label>
        <div class="mb-2"><input type="text" id="port" class="form-control form-control-sm bg-black text-white border-secondary"></div>
        <div class="mb-3"><input type="number" id="baud" class="form-control form-control-sm bg-black text-white border-secondary"></div>
        <div class="d-grid gap-2">
            <button id="btn-connect" class="btn btn-success btn-sm" onclick="connect()">CONNECT</button>
            <button id="btn-disconnect" class="btn btn-danger btn-sm d-none" onclick="disconnect()">DISCONNECT</button>
        </div>
        <div class="mt-3 text-center"><span id="conn-status" class="badge bg-secondary">OFFLINE</span></div>
    </div>
    
    <div class="card p-3 bg-dark border-secondary">
        <label class="metric-label mb-2"><i class="fas fa-crosshairs"></i> TARGET ADDR</label>
        <input type="number" id="target-addr" class="form-control form-control-sm bg-black text-white border-secondary">
    </div>
</div>

<div class="main-content">
    <div id="page-control">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <i class="fas fa-bars sidebar-toggle fs-4" onclick="toggleSidebar()"></i>
                <div><h4 class="mb-0">System Overview</h4><div class="text-muted small">Real-time Command & Control Interface</div></div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header"><i class="fas fa-download"></i> Telemetry Requests (One-Shot)</div>
            <div class="card-body p-2 d-flex flex-wrap gap-2" id="tm-req-container"></div>
        </div>

        <div class="row g-4 mb-4" id="display-cards-container"></div>
        
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="fas fa-terminal"></i> Live Packet Stream</span>
                <div class="btn-group">
                    <button class="btn btn-xs btn-outline-info py-0" style="font-size: 0.7rem;" onclick="downloadLog()"><i class="fas fa-download"></i> Log</button>
                    <button class="btn btn-xs btn-outline-danger py-0" style="font-size: 0.7rem;" onclick="clearLog()"><i class="fas fa-trash"></i> Clear</button>
                </div>
            </div>
            <div id="raw-log" class="log-box"></div>
        </div>

        <h5 class="mb-3">Telecommands</h5>
        <div class="row g-4" id="tc-container"></div>
        
    </div>

    <div id="page-graphs" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <i class="fas fa-bars sidebar-toggle fs-4" onclick="toggleSidebar()"></i>
                <div><h4 class="mb-0">Live Telemetry</h4><div class="text-muted small">Real-time sensor visualization</div></div>
            </div>
            <div class="card p-2 d-flex flex-row align-items-center gap-3 bg-dark mb-0">
                <div class="input-group input-group-sm">
                    <span class="input-group-text bg-secondary text-white border-0">Rate (ms)</span>
                    <input type="number" id="poll-rate" class="form-control bg-black text-white border-secondary" value="250" style="width: 70px;">
                </div>
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" id="pollToggle">
                    <label class="form-check-label small text-white">LIVE</label>
                </div>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-success" onclick="downloadData()"><i class="fas fa-file-csv"></i> Data</button>
                    <button class="btn btn-outline-danger" onclick="clearPlots()"><i class="fas fa-trash"></i> Reset</button>
                </div>
            </div>
        </div>
        <div class="row g-4" id="plots-container"></div>
    </div>
</div>

<script>
    let appConfig = {};
    let charts = {};
    let cursors = {};

    function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('collapsed');
        document.querySelector('.main-content').classList.toggle('expanded');
    }

    function showPage(p) {
        document.getElementById('page-control').classList.add('d-none');
        document.getElementById('page-graphs').classList.add('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('page-' + p).classList.remove('d-none');
        event.currentTarget.classList.add('active');
    }

    // --- LOG & PLOT MANAGEMENT ---
    async function clearLog() {
        await fetch('/api/clear_log', {method:'POST'});
        document.getElementById('raw-log').innerHTML = '';
    }

    async function clearPlots() {
        await fetch('/api/clear_log', {method:'POST'});
        Object.keys(charts).forEach(id => {
            charts[id].data.labels = [];
            charts[id].data.datasets.forEach(ds => ds.data = []);
            charts[id].update();
        });
        Object.keys(cursors).forEach(k => cursors[k] = "");
    }

    function downloadLog() { window.location.href = '/api/download_log'; }
    function downloadData() { window.location.href = '/api/download_data'; }

    // --- DYNAMIC UI GENERATION ---
    async function initApp() {
        const res = await fetch('/api/config');
        appConfig = await res.json();
        
        // Apply Backend Defaults
        document.getElementById('app-title').innerText = appConfig.title || 'Dashboard';
        document.getElementById('port').value = appConfig.port || '/dev/ttyACM0';
        document.getElementById('baud').value = appConfig.baud || 115200;
        document.getElementById('target-addr').value = appConfig.target_addr || 2;

        // 1. Build TM Request Buttons
        const tmCont = document.getElementById('tm-req-container');
        appConfig.tm_requests.forEach(tm => {
            tmCont.innerHTML += `<button class="btn btn-secondary btn-sm flex-grow-1" onclick="reqTM(${tm.id})">${tm.name}</button>`;
        });

        // 2. Build Display Cards
        const dispCont = document.getElementById('display-cards-container');
        appConfig.display_cards.forEach(card => {
            let fieldsHTML = card.fields.map(f => `
                <div class="d-flex justify-content-between mb-2">
                    <span class="metric-label">${f.label}</span>
                    <span id="val-${card.tm_id}-${f.key}" class="metric-val">--</span>
                </div>`).join('');
            dispCont.innerHTML += `
                <div class="col-md-4">
                    <div class="card h-100">
                        <div class="card-header"><i class="fas fa-microchip"></i> ${card.name}</div>
                        <div class="card-body p-3">${fieldsHTML}</div>
                    </div>
                </div>`;
        });

        // 3. Build Telecommands
        const tcCont = document.getElementById('tc-container');
        appConfig.command_cards.forEach(group => {
            let cmdsHTML = group.commands.map(cmd => {
                
                // If the command has fields, render a form block
                if (cmd.fields && cmd.fields.length > 0) {
                    let inputs = cmd.fields.map(f => {
                        if (f.type === 'select') {
                            let opts = Object.entries(f.options).map(([k, v]) => `<option value="${k}">${v}</option>`).join('');
                            return `<div class="mb-2"><label class="metric-label">${f.label}</label><select class="form-select form-select-sm bg-dark text-white border-secondary" id="cmd-${cmd.id}-${f.name}">${opts}</select></div>`;
                        }
                        if (f.type === 'bool') {
                            return `<div class="form-check mb-2"><input type="checkbox" class="form-check-input" id="cmd-${cmd.id}-${f.name}"><label class="form-check-label metric-label">${f.label}</label></div>`;
                        }
                        if (f.type === 'text') {
                            return `<div class="mb-2"><label class="metric-label">${f.label}</label><input type="text" class="form-control form-control-sm bg-dark text-white border-secondary" id="cmd-${cmd.id}-${f.name}"></div>`;
                        }
                        // Default to number
                        return `<div class="mb-2"><label class="metric-label">${f.label}</label><input type="number" step="any" class="form-control form-control-sm bg-dark text-white border-secondary" id="cmd-${cmd.id}-${f.name}"></div>`;
                    }).join('');
                    
                    return `
                        <div class="p-3 border border-secondary rounded mb-3 bg-black">
                            <h6 class="text-info mb-3">${cmd.name}</h6>
                            ${inputs}
                            <button class="btn btn-outline-primary btn-sm w-100 mt-2" onclick="sendDynamicCmd(${cmd.id})"><i class="fas fa-paper-plane"></i> Send Command</button>
                        </div>`;
                } else {
                    // If the command has NO fields, render a simple clickable button!
                    return `
                        <div class="p-2 border border-secondary rounded mb-3 bg-black text-center">
                            <button class="btn btn-primary btn-sm w-100" onclick="sendDynamicCmd(${cmd.id})"><i class="fas fa-bolt"></i> ${cmd.name}</button>
                        </div>`;
                }
            }).join('');

            tcCont.innerHTML += `
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header"><i class="fas fa-cogs"></i> ${group.group}</div>
                        <div class="card-body p-3">${cmdsHTML}</div>
                    </div>
                </div>`;
        });

        // 4. Build Plots
        const plotsCont = document.getElementById('plots-container');
        appConfig.plots.forEach(plot => {
            cursors[plot.id] = "";
            plotsCont.innerHTML += `
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header text-info"><i class="fas fa-chart-area"></i> ${plot.title}</div>
                        <div class="card-body p-2"><div class="chart-container"><canvas id="chart-${plot.id}"></canvas></div></div>
                    </div>
                </div>`;
        });
        
        Chart.defaults.color='#6c757d'; Chart.defaults.borderColor='#343a40'; Chart.defaults.font.family="'Segoe UI',sans-serif";
        appConfig.plots.forEach(plot => {
            charts[plot.id] = new Chart(document.getElementById(`chart-${plot.id}`), {
                type: 'line',
                data: { labels: [], datasets: plot.keys.map((k, i) => ({ label: k, borderColor: plot.colors[i], borderWidth: 2, pointRadius: 0, tension: 0, data: [] })) },
                options: { animation: false, responsive: true, maintainAspectRatio: false, scales: { x: { display: true }, y: { display: true } } }
            });
        });

        updateLoop();
    }

    // --- COMMS ---
    async function connect() {
        await fetch('/api/connect', { 
            method:'POST', 
            headers:{'Content-Type':'application/json'}, 
            body:JSON.stringify({
                port: document.getElementById('port').value, 
                baud: document.getElementById('baud').value
            })
        });
    }
    
    async function disconnect() { await fetch('/api/disconnect', { method:'POST' }); }
    
    function reqTM(id) { 
        fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({target: document.getElementById('target-addr').value, id:id, is_request:true})}); 
    }
    
    function sendDynamicCmd(id) {
        let cmdDef = null;
        appConfig.command_cards.forEach(g => g.commands.forEach(c => { if(c.id === id) cmdDef = c; }));
        let kwargs = {};
        
        if (cmdDef.fields) {
            cmdDef.fields.forEach(f => {
                let el = document.getElementById(`cmd-${id}-${f.name}`);
                if (f.type === 'bool') kwargs[f.name] = el.checked;
                else if (f.type === 'number') kwargs[f.name] = parseFloat(el.value);
                else kwargs[f.name] = el.value; // Keeps 'text' and 'select' options as strings
            });
        }
        
        fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({target: document.getElementById('target-addr').value, id:id, kwargs:kwargs})});
    }

    // --- UPDATE LOOP ---
    async function updateLoop() {
        try {
            const r = await fetch('/api/status');
            const s = await r.json();
            
            document.getElementById('conn-status').innerText = s.connected ? "ONLINE" : "OFFLINE";
            document.getElementById('conn-status').className = s.connected ? "badge bg-success" : "badge bg-secondary";
            document.getElementById('btn-connect').classList.toggle('d-none', s.connected);
            document.getElementById('btn-disconnect').classList.toggle('d-none', !s.connected);

            // Update DOM Values dynamically
            appConfig.display_cards.forEach(card => {
                if(s.data[card.tm_id]) {
                    card.fields.forEach(f => {
                        let el = document.getElementById(`val-${card.tm_id}-${f.key}`);
                        if(el && s.data[card.tm_id][f.key] !== undefined) el.innerText = s.data[card.tm_id][f.key];
                    });
                }
            });

            // Update Log with custom EVENT styling
            document.getElementById('raw-log').innerHTML = s.logs.map(l => {
                let badgeColor = 'bg-secondary';
                let textColor = '#7ee787'; 
                
                if (l.Type === 'EVENT') { 
                    badgeColor = 'bg-info text-dark'; 
                    textColor = '#0dcaf0'; 
                }
                else if (l.Type === 'ACK') badgeColor = 'bg-primary';
                else if (l.Dir === 'TX') badgeColor = 'bg-warning text-dark';
                else if (l.Dir === 'RX') badgeColor = 'bg-success';
                
                return `<div style="border-bottom:1px solid #222;padding:2px 0">
                    <span style="color:#888;font-size:0.7rem;margin-right:5px;">[${l.Time}]</span> 
                    <span class="badge ${badgeColor}" style="width:55px; margin-right:5px;">${l.Type||l.Dir}</span> 
                    <span style="color:#d63384; margin-right:5px;">ID:${l.ID}</span> 
                    <span style="color:${textColor};font-family:monospace">${l.Hex}</span>
                </div>`;
            }).join('');

            // Polling & Charts
            if (document.getElementById('pollToggle').checked && s.connected) {
                const now = Date.now();
                if (!window.lastCmdTime || (now - window.lastCmdTime) > 200) {
                     appConfig.tm_requests.forEach(tm => reqTM(tm.id));
                     window.lastCmdTime = now;
                }

                if (!document.getElementById('page-graphs').classList.contains('d-none')) {
                    let query = Object.keys(cursors).map(k => `since_${k}=${encodeURIComponent(cursors[k])}`).join('&');
                    const hRes = await fetch('/api/history?' + query);
                    const history = await hRes.json();
                    
                    appConfig.plots.forEach(plot => {
                        let data = history[plot.id];
                        if (data && data.length > 0) {
                            let chart = charts[plot.id];
                            data.forEach(pt => {
                                chart.data.labels.push(pt.Time);
                                plot.keys.forEach((key, idx) => chart.data.datasets[idx].data.push(pt[key]));
                            });
                            if (chart.data.labels.length > 100) {
                                let rem = chart.data.labels.length - 100;
                                chart.data.labels.splice(0, rem);
                                chart.data.datasets.forEach(ds => ds.data.splice(0, rem));
                            }
                            chart.update('none');
                            cursors[plot.id] = data[data.length - 1].Time;
                        }
                    });
                }
            }
        } catch(e) { }
        
        const nextPoll = Math.max(100, parseInt(document.getElementById('poll-rate')?.value) || 250);
        setTimeout(updateLoop, nextPoll);
    }

    initApp();
</script>
</body>
</html>
