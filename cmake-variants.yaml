target_platform:
  default: rp2350
  choices:
    rp2350:
      short: RP2350
      long: Build for RP2350 Wireless
      settings:
        PICO_BOARD: "pico2_w"
        BUILD_TESTING: "OFF"

    mac:
      short: Mac
      long: Build for macOS
      settings:
        PICO_PLATFORM: "host"
        PICO_BOARD: "host"
        BUILD_TESTING: "ON"
        CMAKE_C_COMPILER: "/usr/bin/clang"
        CMAKE_CXX_COMPILER: "/usr/bin/clang++"
        CMAKE_ASM_COMPILER: "/usr/bin/clang"
