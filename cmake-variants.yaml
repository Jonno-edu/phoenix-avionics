      short: Main OBC
      buildType: Debug
      settings:
        PICO_BOARD: "pico2_w"
        BUILD_TARGET: "OBC"
        BUILD_TESTING: "OFF"
    hil:
      short: HIL Node
      buildType: Debug
      settings:
        PICO_BOARD: "pico2_w"
        BUILD_TARGET: "HIL"
        BUILD_TESTING: "OFF"
    mac:
      short: Mac Host
      buildType: Debug
      settings:
        PICO_PLATFORM: "host"
        PICO_BOARD: "host"
        BUILD_TARGET: "ALL"
        BUILD_TESTING: "ON"
