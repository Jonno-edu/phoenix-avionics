# ============================================================================
# Phoenix Avionics - Docker Compose Configuration
# Usage:
#   docker-compose up -d      # Start container in background
#   docker-compose exec pico-dev bash  # Enter container
#   docker-compose down       # Stop container
# ============================================================================

services:
  pico-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: phoenix-avionics-dev:latest
    container_name: phoenix-avionics-dev
    
    volumes:
      # Mount project source code
      - .:/workspace
      
      # Mount SSH keys for remote flashing (read-only)
      # This allows scp/ssh to work with the Rock Pi
      - ~/.ssh:/root/.ssh:ro
    
    working_dir: /workspace
    
    # Keep container running for interactive use
    stdin_open: true
    tty: true
    
    # Environment variables for remote flashing
    # Override these in .env file or command line
    environment:
      - ROCK_PI_HOST=${ROCK_PI_HOST:-100.93.29.121}
      - ROCK_PI_USER=${ROCK_PI_USER:-rock}
      - ROCK_PI_PORT=${ROCK_PI_PORT:-22}
      - PICO_BOARD=${PICO_BOARD:-pico2_w}
    
    # Use host network for SSH access
    # On macOS/Windows, you may need to adjust this
    network_mode: bridge